name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (crawl only 3 papers, skip data branch push)'
        required: false
        type: boolean
        default: false


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
        uv sync

    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        today=$(date -u "+%Y-%m-%d")

        if [ "${{ inputs.test_mode }}" = "true" ]; then
          data_file="data/${today}_test.jsonl"
          export MAX_PAPERS=3
          echo "🧪 TEST MODE: limiting to $MAX_PAPERS papers"
        else
          # 先写到临时文件，成功后原子替换
          data_file="data/${today}.jsonl.tmp"
        fi

        echo "开始爬取 $today 的arXiv论文... / Starting to crawl $today arXiv papers..."
        echo "数据文件: $data_file / Data file: $data_file"

        cd daily_arxiv
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export TOKEN_GITHUB=${{ secrets.TOKEN_GITHUB }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export CATEGORIES="${{ vars.CATEGORIES }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"

        scrapy crawl arxiv -o ../$data_file:jsonlines

        if [ ! -f "../$data_file" ]; then
            echo "爬取失败，未生成数据文件 / Crawling failed, no data file generated"
            exit 1
        fi

        echo "crawl_date=$today" >> $GITHUB_OUTPUT
        echo "data_file=$data_file" >> $GITHUB_OUTPUT
        echo "is_test=${{ inputs.test_mode }}" >> $GITHUB_OUTPUT
        echo "爬取完成 / Crawling completed"

    - name: Check for duplicates
      id: dedup_check
      run: |
        source .venv/bin/activate
        DATA_FILE="${{ steps.crawl_step.outputs.data_file }}"
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"
        today=${{ steps.crawl_step.outputs.crawl_date }}

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 Test mode: skipping dedup check"
          echo "has_new_content=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "执行去重检查... / Performing intelligent deduplication check..."
        echo "数据文件: $DATA_FILE"

        cd daily_arxiv
        set +e
        python daily_arxiv/check_stats.py ../$DATA_FILE
        dedup_exit_code=$?
        set -e

        echo "去重检查退出码: $dedup_exit_code"

        case $dedup_exit_code in
            0)
                echo "has_new_content=true" >> $GITHUB_OUTPUT
                ;;
            1)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=no_new_content" >> $GITHUB_OUTPUT
                ;;
            2)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=processing_error" >> $GITHUB_OUTPUT
                exit 1
                ;;
            *)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=unknown_error" >> $GITHUB_OUTPUT
                exit 1
                ;;
        esac

        # 去重成功：原子替换正式文件
        if [ "$dedup_exit_code" = "0" ]; then
          FINAL_FILE="../data/${today}.jsonl"
          mv "../$DATA_FILE" "$FINAL_FILE"
          echo "✅ 去重完成，已保存到 $FINAL_FILE"
        else
          # 无新内容或出错：清理临时文件，保留旧数据
          rm -f "../$DATA_FILE"
          echo "⏹️ 无新内容，临时文件已清理，旧数据不受影响"
        fi

    - name: AI Enhancement Processing
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          DATA_FILE="../data/${today}_test.jsonl"
        else
          DATA_FILE="../data/${today}.jsonl"
        fi

        echo "开始AI增强处理... / Starting AI enhancement processing..."
        echo "数据文件: $DATA_FILE"

        cd ai
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        export KEYWORDS="${{ vars.KEYWORDS }}"

        python enhance.py --data $DATA_FILE --max_workers 10

        if [ $? -ne 0 ]; then
            echo "AI处理失败 / AI processing failed"
            exit 1
        fi
        echo "AI增强处理完成 / AI enhancement processing completed"

    - name: Convert to Markdown
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          AI_FILE="../data/${today}_test_AI_enhanced_${LANGUAGE}.jsonl"
        else
          AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"
        fi

        echo "转换为Markdown格式... / Converting to Markdown format..."
        echo "AI文件: $AI_FILE"

        cd to_md

        if [ -f "$AI_FILE" ]; then
            python convert.py --data "$AI_FILE"
        else
            echo "错误：未找到AI增强文件 / Error: AI enhanced file not found: $AI_FILE"
            exit 1
        fi

        if [ $? -ne 0 ]; then
            echo "Markdown转换失败 / Markdown conversion failed"
            exit 1
        fi
        echo "Markdown转换完成 / Markdown conversion completed"

    - name: Generate password hash and inject into config
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        echo "🔐 Generating password hash for authentication..."

        PASSWORD="${{ secrets.ACCESS_PASSWORD }}"

        if [ -z "$PASSWORD" ]; then
          echo "⚠️  WARNING: ACCESS_PASSWORD not set in Secrets"
          echo "⚠️  Password protection will be DISABLED"
          PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
        else
          PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
          echo "✅ Password hash generated successfully"
          echo "🔐 Password protection is ENABLED"
        fi

        if [ -f "js/auth-config.js" ]; then
          sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js
          echo "✅ Password hash injected into js/auth-config.js"
        else
          echo "❌ ERROR: js/auth-config.js not found!"
          exit 1
        fi

        echo "🔐 Authentication setup complete"

    - name: Summary
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 TEST MODE 完成 — 测试文件: data/${{ steps.crawl_step.outputs.crawl_date }}_test*.jsonl"
          echo "🧪 清理测试文件命令: rm data/*_test*"
        elif [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
          echo "✅ 工作流完成：发现新内容并成功处理"
        else
          echo "ℹ️ 工作流完成：${{ steps.dedup_check.outputs.skip_reason }}"
        fi

    - name: Inject repository info into data-config.js
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        echo "注入仓库信息到 data-config.js... / Injecting repository info into data-config.js..."

        REPO_OWNER="${{ github.repository_owner }}"
        REPO_NAME="${{ github.event.repository.name }}"

        echo "仓库所有者: $REPO_OWNER"
        echo "仓库名称: $REPO_NAME"

        if [ -f "js/data-config.js" ]; then
          sed -i "s/repoOwner: '[^']*'/repoOwner: '$REPO_OWNER'/g" js/data-config.js
          sed -i "s/repoName: '[^']*'/repoName: '$REPO_NAME'/g" js/data-config.js
          echo "✅ 仓库信息已注入到 js/data-config.js"
        else
          echo "❌ ERROR: js/data-config.js not found!"
          exit 1
        fi

    - name: Commit code changes to main branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 Test mode: skipping main branch commit"
          exit 0
        fi

        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"

        git add js/data-config.js
        git add .github/
        git add -A
        git reset -- data/* assets/file-list.txt 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "没有代码变更需要提交"
        else
          git commit -m "chore: update data-config.js with repository info"
          echo "代码变更已提交到 main 分支"
        fi

    - name: Push code changes to main branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 Test mode: skipping main branch push"
          exit 0
        fi

        git config pull.rebase true
        git config rebase.autoStash true

        for i in {1..3}; do
          echo "推送代码变更尝试 $i"
          if git push origin main; then
            echo "代码变更推送成功"
            break
          else
            echo "推送失败，拉取最新变更..."
            git pull origin main --no-edit || true
            if [ $i -eq 3 ]; then
              echo "3次尝试后推送失败"
              exit 1
            fi
          fi
        done

    - name: Prepare data files for data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 Test mode: skipping data branch preparation"
          exit 0
        fi

        echo "准备数据文件... / Preparing data files..."
        today=${{ steps.crawl_step.outputs.crawl_date }}

        mkdir -p /tmp/data_files/data
        mkdir -p /tmp/data_files/assets

        cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
        cp assets/file-list.txt /tmp/data_files/assets/ 2>/dev/null || true

        echo "数据文件已保存到临时目录"

    - name: Setup and commit to data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 Test mode: skipping data branch commit"
          exit 0
        fi

        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"

        echo "设置 data 分支..."
        today=${{ steps.crawl_step.outputs.crawl_date }}

        rm -rf data/*.jsonl 2>/dev/null || true
        rm -f data/*.md 2>/dev/null || true
        rm -f assets/file-list.txt 2>/dev/null || true

        if git ls-remote --heads origin data | grep -q data; then
          echo "data 分支已存在，切换到 data 分支"
          git fetch origin data:data
          git checkout data
          git pull origin data || true
        else
          echo "data 分支不存在，创建新分支"
          git checkout --orphan data
          git rm -rf --cached . 2>/dev/null || true
          mkdir -p data assets
          echo "# Data Branch" > README.md
          git add README.md
          git commit -m "chore: initialize data branch"
          git push origin data
        fi

        mkdir -p data assets
        cp -r /tmp/data_files/data/* data/ 2>/dev/null || true

        # 在 data 分支中重新生成完整的文件列表（包含所有历史文件）
        ls data/*_AI_enhanced_*.jsonl 2>/dev/null | grep -v _test | sed 's|data/||' > assets/file-list.txt
        echo "文件列表已更新，共 $(wc -l < assets/file-list.txt) 个文件"


        git add data/* 2>/dev/null || true
        git add assets/file-list.txt 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "没有数据变更需要提交"
        else
          git commit -m "update: $today arXiv papers"
          echo "数据变更已提交到 data 分支"
        fi

    - name: Push data changes to data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        IS_TEST="${{ steps.crawl_step.outputs.is_test }}"

        if [ "$IS_TEST" = "true" ]; then
          echo "🧪 Test mode: skipping data branch push"
          exit 0
        fi

        git config pull.rebase true
        git config rebase.autoStash true

        for i in {1..3}; do
          echo "推送数据变更尝试 $i"
          if git push origin data; then
            echo "数据变更推送成功"
            break
          else
            echo "推送失败，拉取最新变更..."
            git pull origin data --no-edit || true
            if [ $i -eq 3 ]; then
              echo "3次尝试后推送失败"
              exit 1
            fi
          fi
        done
