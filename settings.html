<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="daily arxiv ai-enhanced settings">
    <title>设置 - Daily arXiv AI Enhanced</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="shortcut icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">

    <!-- Authentication Scripts -->
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check authentication on page load
        Auth.requireAuth();

        // Show logout button only if password protection is enabled
        document.addEventListener('DOMContentLoaded', function() {
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton && Auth.isPasswordEnabled()) {
                logoutButton.style.display = '';
            }
        });
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left"></div>
                
                <div class="header-center">
                    <a href="index.html" class="site-logo">
                        <img src="assets/logo2-removebg-preview.png" alt="Daily arXiv AI Enhanced Logo" class="logo-image">
                        <span class="site-title">Daily arXiv AI Enhanced</span>
                    </a>
                </div>
                
                <div class="header-controls">
                    <a href="index.html" class="back-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="currentColor"/>
                        </svg>
                    </a>
                    <button id="logoutButton" onclick="Auth.logout()" class="icon-button" title="Logout" style="border: none; background: transparent; cursor: pointer; color: #e74c3c; display: none;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.59L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="settings-page">
            <div class="settings-container">
                <div class="settings-header">
                    <h1>设置</h1>
                    <p>自定义您的论文浏览体验</p>
                </div>

                <div class="settings-content">
                    <div class="settings-section">
                        <div class="keyword-section-title">
                            <div class="keyword-section-title-left">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7V17C3 18.1 3.9 18.99 5 18.99L16 19C16.67 19 17.27 18.67 17.63 18.16L22 12L17.63 5.84ZM16 17H5V7H16L19.55 12L16 17Z" fill="currentColor"/>
                                </svg>
                                关注关键词
                            </div>
                            <button id="copyKeywords" class="copy-button" title="复制关键词到剪贴板">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                                </svg>
                                复制
                            </button>
                        </div>
                        <div class="settings-card">
                            <div class="settings-item">
                                <div class="tag-selector">
                                    <div class="selected-tags" id="selectedKeywords">
                                        <div class="empty-tag-message" id="emptyTagMessage">暂未添加关键词，在下方输入框中添加。</div>
                                    </div>
                                    <div class="tag-input-container">
                                        <input type="text" id="keywordInput" class="settings-input" placeholder="输入关键词，按回车添加...">
                                        <button id="addKeyword" class="add-tag-button">添加</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <div class="keyword-section-title">
                            <div class="keyword-section-title-left">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>
                                </svg>
                                关注作者
                            </div>
                            <button id="copyAuthors" class="copy-button" title="复制作者到剪贴板">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                                </svg>
                                复制
                            </button>
                        </div>
                        <div class="settings-card">
                            <div class="settings-item">
                                <div class="tag-selector">
                                    <div class="selected-tags" id="selectedAuthors">
                                        <div class="empty-tag-message" id="emptyAuthorMessage">暂未添加作者，在下方输入框中添加。</div>
                                    </div>
                                    <div class="tag-input-container">
                                        <input type="text" id="authorInput" class="settings-input" placeholder="输入作者名，按回车添加...">
                                        <button id="addAuthor" class="add-tag-button">添加</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                    <div class="settings-section">
                        <div class="keyword-section-title">
                            <div class="keyword-section-title-left">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 12h2v5H7v-5zm4-3h2v8h-2V9zm4 5h2v3h-2v-3z" fill="currentColor"/>
                                </svg>
                                全文 AI 总结
                            </div>
                        </div>
                        <div class="settings-card">
                            <div class="settings-item">
                                <p style="margin: 0 0 12px 0; color: var(--text-secondary); font-size: 14px;">
                                    部署 Cloudflare Worker 后将端点地址填入下方即可启用全文 AI 总结功能。部署说明请参见 <code>worker/worker.js</code>。
                                </p>
                                <div class="tag-input-container">
                                    <input type="url" id="endpointInput" class="settings-input" placeholder="https://your-worker.workers.dev" style="flex: 1;">
                                    <button id="saveEndpoint" class="add-tag-button">保存</button>
                                </div>
                                <p id="endpointStatus" style="margin: 8px 0 0 0; font-size: 13px; color: var(--text-secondary);"></p>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="settings-actions">
                    <button id="resetSettings" class="button">恢复默认</button>
                    <button id="saveSettings" class="button primary">保存设置</button>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="footer-content">
                <p>&copy; 2025 daily-arXiv-ai-enhanced | <a href="https://github.com/dw-dengwei/daily-arXiv-ai-enhanced" target="_blank">GitHub</a></p>
            </div>
        </footer>
    </div>

    <script src="js/settings.js"></script>
</body>
</html>
